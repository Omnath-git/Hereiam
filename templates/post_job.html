<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Post a Job - Here I am | Vibrant Recruitment</title>
    <!-- Google Fonts + Bootstrap 5 + Font Awesome 6 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f9f3ff 0%, #ffe9f4 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        /* custom variables */
        :root {
            --primary: #c026d3;
            --primary-dark: #a21caf;
            --primary-light: #f3e8ff;
            --secondary: #f97316;
            --success: #10b981;
            --info: #3b82f6;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient-hero: linear-gradient(135deg, #4f46e5 0%, #c026d3 100%);
            --gradient-card: linear-gradient(125deg, #ffffff 0%, #fffafc 100%);
            --shadow-xl: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
            --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.08);
            --radius-2xl: 2rem;
            --radius-xl: 1.25rem;
            --radius-md: 0.75rem;
        }

        /* navbar simulation (light) */
        .custom-navbar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(192, 38, 211, 0.2);
            padding: 1rem 2rem;
        }

        /* main container */
        .post-job-container {
            min-height: calc(100vh - 80px);
            padding: 3rem 0 4rem;
        }

        /* colorful animated header */
        .post-job-header {
            background: var(--gradient-hero);
            border-radius: var(--radius-2xl);
            padding: 2.2rem 2.8rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            transition: all 0.3s ease;
        }

        .post-job-header::after {
            content: "✨";
            font-size: 180px;
            position: absolute;
            bottom: -30px;
            right: -20px;
            opacity: 0.1;
            pointer-events: none;
            transform: rotate(-10deg);
        }

        .post-job-header h1 {
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff, #ffe6fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .post-job-header p {
            font-size: 1.1rem;
            color: rgba(255,255,245,0.9);
            font-weight: 500;
        }

        /* card styling */
        .post-job-card {
            background: var(--gradient-card);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            backdrop-filter: blur(2px);
            transition: transform 0.2s;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .card-body {
            padding: 2.5rem 2.8rem;
        }

        /* section titles */
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(120deg, #4f46e5, #c2410c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
            padding-bottom: 0.6rem;
            border-bottom: 3px dotted #f0c0e8;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title i {
            background: white;
            padding: 8px;
            border-radius: 18px;
            color: #c026d3;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(192,38,211,0.2);
        }

        /* form labels */
        .form-label {
            font-weight: 700;
            font-size: 0.8rem;
            color: #4a4a6a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            border: 2px solid #f0defa;
            border-radius: 18px;
            padding: 12px 18px;
            font-weight: 500;
            background-color: #ffffffdd;
            transition: all 0.2s;
        }

        .form-control:focus, .form-select:focus {
            border-color: #c026d3;
            box-shadow: 0 0 0 4px rgba(192, 38, 211, 0.2);
            background: white;
        }

        .input-icon-wrap {
            position: relative;
        }

        .input-icon-wrap .form-control {
            padding-left: 48px;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #c026d3;
            font-size: 1.1rem;
        }

        /* job type pills (vibrant) */
        .job-type-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .job-type-option input[type="radio"] {
            display: none;
        }

        .job-type-option label {
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            border: 2px solid #e2d0f5;
            background: #fff;
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #422b6b;
        }

        .job-type-option input[type="radio"]:checked + label {
            background: linear-gradient(95deg, #c026d3, #f97316);
            border-color: transparent;
            color: white;
            box-shadow: 0 10px 18px -8px #c026d3;
        }

        /* skills container */
        .skills-input-container {
            border: 2px solid #f0defa;
            border-radius: 20px;
            padding: 10px 14px;
            background: #fffffff2;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 70px;
            transition: all 0.2s;
        }

        .skills-input-container:focus-within {
            border-color: #c026d3;
            box-shadow: 0 0 0 4px rgba(192,38,211,0.15);
        }

        .skill-tag {
            background: linear-gradient(120deg, #fae8ff, #ffe0f0);
            color: #b91c9e;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            animation: bounceSoft 0.2s ease;
        }

        @keyframes bounceSoft {
            0% { transform: scale(0.8); opacity: 0;}
            100% { transform: scale(1); opacity: 1;}
        }

        .remove-tag {
            background: rgba(185,28,158,0.2);
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 30px;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: #b91c9e;
        }

        .remove-tag:hover {
            background: #ef4444;
            color: white;
        }

        /* apply method taps */
        .apply-method-selector {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .apply-method-option input {
            display: none;
        }

        .apply-method-option label {
            background: white;
            border: 2px solid #e9d1fa;
            border-radius: 60px;
            padding: 12px 28px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #4b2e6b;
        }

        .apply-method-option input:checked + label {
            background: linear-gradient(135deg, #4f46e5, #c026d3);
            color: white;
            border-color: transparent;
            box-shadow: 0 10px 18px -8px #4f46e5;
        }

        /* buttons */
        .action-buttons {
            display: flex;
            gap: 18px;
            justify-content: flex-end;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .btn-preview {
            background: rgba(255,255,240,0.9);
            border: 2px solid #d9b8f0;
            border-radius: 60px;
            padding: 12px 30px;
            font-weight: 700;
            transition: 0.2s;
            color: #7c3aed;
        }

        .btn-preview:hover {
            background: #ffffff;
            border-color: #c026d3;
            transform: translateY(-3px);
        }

        .btn-post {
            background: linear-gradient(105deg, #f97316, #c026d3);
            border: none;
            border-radius: 60px;
            padding: 12px 36px;
            font-weight: 800;
            color: white;
            box-shadow: 0 12px 20px -12px #c026d3;
            transition: all 0.25s;
        }

        .btn-post:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 28px -12px #c026d3;
            background: linear-gradient(105deg, #fb923c, #d946ef);
        }

        /* info box colorful */
        .info-box {
            background: linear-gradient(105deg, #fef9ff, #fff0f7);
            border-left: 8px solid #f97316;
            border-radius: 28px;
            padding: 18px 24px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
        }

        .char-counter.warning { color: #f97316; font-weight: bold; }
        .char-counter.danger { color: #ef4444; font-weight: bold; }

        /* preview modal */
        .modal-content {
            border-radius: 32px;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .card-body { padding: 1.5rem; }
            .post-job-header { padding: 1.5rem; }
            .section-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<!-- minimal navbar mock (beauty) -->
<div class="custom-navbar d-flex justify-content-between align-items-center">
    <div>
        <i class="fas fa-feather-alt" style="color:#c026d3; font-size: 28px;"></i>
        <span class="fw-bold ms-2 fs-4" style="background: linear-gradient(135deg, #c026d3, #f97316); -webkit-background-clip: text; background-clip: text; color: transparent;">Here I am</span>
    </div>
    <div class="d-none d-md-block">
        <span class="badge bg-light text-dark rounded-pill px-3 py-2"><i class="fas fa-globe me-1"></i> 🌈 10k+ active talents</span>
    </div>
</div>

<div class="post-job-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="post-job-card">
                    <div class="card-body">
                        <form method="POST" action="#" id="postJobForm">
                            <div class="row g-4">
                                <div class="col-md-12">
                                    <label class="form-label">Job Title <span class="text-danger">*</span></label>
                                    <div class="input-icon-wrap">
                                        <input type="text" name="title" id="jobTitle" class="form-control" placeholder="e.g., 💎 Senior UI/UX Designer" required>
                                        <i class="fas fa-briefcase input-icon"></i>
                                    </div>
                                    <label class="form-label">Job Type <span class="text-danger">*</span></label>
                                    <div class="job-type-selector">
                                        <div class="job-type-option"><input type="radio" name="job_type" value="Full-time" id="ftFull" checked><label for="ftFull"><i class="fas fa-clock"></i> Full-time</label></div>
                                        <div class="job-type-option"><input type="radio" name="job_type" value="Part-time" id="ftPart"><label for="ftPart"><i class="fas fa-hourglass-half"></i> Part-time</label></div>
                                        <div class="job-type-option"><input type="radio" name="job_type" value="Contract" id="ftContract"><label for="ftContract"><i class="fas fa-file-signature"></i> Contract</label></div>
                                        <div class="job-type-option"><input type="radio" name="job_type" value="Remote" id="ftRemote"><label for="ftRemote"><i class="fas fa-home"></i> Remote</label></div>
                                    </div>
                                </div>
                            </div>

                            <div class="row g-4 mt-1">
                                <div class="col-md-6">
                                    <label class="form-label">Company Name <span class="text-danger">*</span></label>
                                    <div class="input-icon-wrap"><input type="text" name="company" class="form-control" value="DreamStack Studios" placeholder="Your company name" required><i class="fas fa-building input-icon"></i></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Location <span class="text-danger">*</span></label>
                                    <div class="input-icon-wrap"><input type="text" name="location" class="form-control" placeholder="🌍 Bangalore / Remote / Hybrid" required><i class="fas fa-map-marker-alt input-icon"></i></div>
                                </div>
                            </div>

                            <div class="row g-4 mt-1">
                                <div class="col-md-6">
                                    <label class="form-label">💰 Salary Range</label>
                                    <select name="salary_range" class="form-select">
                                        <option value="Not Disclosed">🌈 Not Disclosed</option>
                                        <option value="3-6 LPA">3-6 LPA</option><option value="6-10 LPA">6-10 LPA</option>
                                        <option value="10-15 LPA">10-15 LPA</option><option value="15-25 LPA">15-25 LPA</option>
                                        <option value="25-50 LPA">25-50 LPA</option><option value="50+ LPA">50+ LPA</option>
                                        <option value="Negotiable">Negotiable 💎</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Experience Required</label>
                                    <select name="experience_required" class="form-select">
                                        <option value="Fresher">Fresher (0 years)</option><option value="1-3 years">1-3 years</option>
                                        <option value="3-5 years">3-5 years</option><option value="5-8 years">5-8 years</option>
                                        <option value="8-12 years">8-12 years</option><option value="12+ years">12+ years</option>
                                    </select>
                                </div>
                            </div>

                            <!-- JOB DETAILS SECTION -->
                                <div class="mb-3">
                                <label class="form-label">📝 Job Description <span class="text-danger">*</span></label>
                                <textarea name="description" id="jobDescription" class="form-control" rows="5" placeholder="Describe the role: day-to-day tasks, culture, growth opportunities ..." required maxlength="3000"></textarea>
                                <div class="char-counter text-end mt-1" id="descCounter">0/3000 characters</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">✅ Requirements / Qualifications</label>
                                <textarea name="requirements" id="jobRequirements" class="form-control" rows="4" placeholder="e.g.,&#10;• 3+ years in React & Node&#10;• Bachelor’s in CS or equivalent&#10;• Passion for pixel-perfect UI" maxlength="2000"></textarea>
                                <div class="char-counter text-end mt-1" id="reqCounter">0/2000 characters</div>
                            </div>

                            <!-- Skills -->
                            <div class="mb-4">
                                <label class="form-label">🔖 Skills Required <span class="text-danger">*</span></label>
                                <div class="skills-input-container" id="skillsContainer">
                                    <input type="text" class="skills-input" id="skillsInput" placeholder="Type skill (e.g., React, Python, Figma) and press Enter ...">
                                </div>
                                <input type="hidden" name="skills_required" id="skillsHidden">
                                <small class="text-muted"><i class="fas fa-arrow-right me-1 text-pink"></i> Press <kbd>Enter</kbd> or <kbd>,</kbd> to add colorful skill tags</small>
                            </div>

                            <!-- APPLY METHOD -->
                            <div class="section-title mt-2"><i class="fas fa-paper-plane"></i> How to apply</div>
                            <div class="apply-method-selector" id="applyMethodSelector">
                                <div class="apply-method-option"><input type="radio" name="apply_method" value="email" id="methodEmail" checked><label for="methodEmail"><i class="fas fa-envelope"></i> 📧 Email</label></div>
                                <div class="apply-method-option"><input type="radio" name="apply_method" value="website" id="methodWebsite"><label for="methodWebsite"><i class="fas fa-globe"></i> 🌐 Website</label></div>
                                <div class="apply-method-option"><input type="radio" name="apply_method" value="both" id="methodBoth"><label for="methodBoth"><i class="fas fa-check-double"></i> ✨ Both</label></div>
                            </div>
                            <div class="row" id="applyFields">
                                <div class="col-md-6 mb-3" id="emailField">
                                    <label class="form-label">Application Email <span class="text-danger">*</span></label>
                                    <div class="input-icon-wrap"><input type="email" name="apply_email" class="form-control" value="careers@hereiam.com" placeholder="hr@company.com"><i class="fas fa-envelope input-icon"></i></div>
                                </div>
                                <div class="col-md-6 mb-3" id="websiteField" style="display: none;">
                                    <label class="form-label">Application URL <span class="text-danger">*</span></label>
                                    <div class="input-icon-wrap"><input type="url" name="apply_website" class="form-control" placeholder="https://company.com/careers"><i class="fas fa-link input-icon"></i></div>
                                </div>
                            </div>

                            <div class="action-buttons">
                                <button type="button" class="btn-preview" onclick="previewJob()"><i class="fas fa-eye me-2"></i>Preview</button>
                                <button type="submit" class="btn-post" id="postJobBtn"><i class="fas fa-rocket me-2"></i>Post Job ✨</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Preview Modal Popup (colorful) -->
<div class="modal fade" id="previewModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content" style="border-radius: 38px;">
            <div class="modal-header" style="background: linear-gradient(115deg, #4f46e5, #db2777); color: white; border-radius: 38px 38px 0 0;">
                <h5 class="modal-title fw-bold"><i class="fas fa-eye me-2"></i>✨ Job Preview ✨</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4" id="previewContent" style="background: #fefcf5;"></div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn-post" onclick="document.getElementById('postJobForm').submit();">🚀 Post Job Now</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // -------------------- SKILLS LOGIC (colorful tags) --------------------
    const skillsContainer = document.getElementById('skillsContainer');
    const skillsInput = document.getElementById('skillsInput');
    const skillsHidden = document.getElementById('skillsHidden');
    let skillsArray = [];

    skillsInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ',') {
            e.preventDefault();
            addSkillFromInput();
        }
        if (e.key === 'Backspace' && this.value === '' && skillsArray.length > 0) {
            removeSkill(skillsArray.length - 1);
        }
    });

    skillsInput.addEventListener('blur', function() {
        if (this.value.trim()) addSkillFromInput();
    });

    function addSkillFromInput() {
        let raw = skillsInput.value.replace(/,/g, '').trim();
        if (raw && !skillsArray.includes(raw)) {
            skillsArray.push(raw);
            renderSkillsTags();
        }
        skillsInput.value = '';
        updateHiddenSkills();
    }

    function removeSkill(index) {
        skillsArray.splice(index, 1);
        renderSkillsTags();
        updateHiddenSkills();
        skillsInput.focus();
    }

    function renderSkillsTags() {
        document.querySelectorAll('.skill-tag').forEach(el => el.remove());
        skillsArray.forEach((skill, i) => {
            const tagSpan = document.createElement('span');
            tagSpan.className = 'skill-tag';
            tagSpan.innerHTML = `${skill} <button type="button" class="remove-tag" onclick="removeSkill(${i})"><i class="fas fa-times"></i></button>`;
            skillsContainer.insertBefore(tagSpan, skillsInput);
        });
    }

    function updateHiddenSkills() {
        skillsHidden.value = skillsArray.join(', ');
        if(skillsArray.length === 0) skillsHidden.value = '';
    }

    // Apply method dynamic fields
    const radioEmail = document.getElementById('methodEmail');
    const radioWeb = document.getElementById('methodWebsite');
    const radioBoth = document.getElementById('methodBoth');
    const emailDiv = document.getElementById('emailField');
    const websiteDiv = document.getElementById('websiteField');

    function toggleApplyFields() {
        if (radioBoth.checked) {
            emailDiv.style.display = 'block';
            websiteDiv.style.display = 'block';
        } else if (radioWeb.checked) {
            emailDiv.style.display = 'none';
            websiteDiv.style.display = 'block';
        } else {
            emailDiv.style.display = 'block';
            websiteDiv.style.display = 'none';
        }
    }
    radioEmail.addEventListener('change', toggleApplyFields);
    radioWeb.addEventListener('change', toggleApplyFields);
    radioBoth.addEventListener('change', toggleApplyFields);
    toggleApplyFields();

    // Character counters
    function charCounter(textId, spanId, limit) {
        const textarea = document.getElementById(textId);
        const span = document.getElementById(spanId);
        textarea.addEventListener('input', () => {
            let len = textarea.value.length;
            span.innerText = `${len}/${limit} characters`;
            if (len > limit * 0.8) span.classList.add('warning'); else span.classList.remove('warning');
            if (len > limit * 0.95) span.classList.add('danger'); else span.classList.remove('danger');
        });
    }
    charCounter('jobDescription', 'descCounter', 3000);
    charCounter('jobRequirements', 'reqCounter', 2000);

    // Form validation & preview
    const postBtn = document.getElementById('postJobBtn');
    const form = document.getElementById('postJobForm');

    form.addEventListener('submit', function(e) {
        const title = document.getElementById('jobTitle').value.trim();
        const desc = document.getElementById('jobDescription').value.trim();
        if (!title) { alert('🌸 Please add a job title!'); e.preventDefault(); return; }
        if (!desc) { alert('✨ Job description is required to attract candidates ✨'); e.preventDefault(); return; }
        if (skillsArray.length === 0) { alert('🎯 At least one skill required — add a skill tag!'); e.preventDefault(); return; }
        if (radioEmail.checked && !document.querySelector('[name="apply_email"]').value.trim()) { alert('📧 Please provide application email.'); e.preventDefault(); return; }
        if (radioWeb.checked && !document.querySelector('[name="apply_website"]').value.trim()) { alert('🌐 Please provide website URL.'); e.preventDefault(); return; }
        if (radioBoth.checked && (!document.querySelector('[name="apply_email"]').value.trim() || !document.querySelector('[name="apply_website"]').value.trim())) {
            alert('✨ Both email and website are required for both method'); e.preventDefault(); return;
        }
        updateHiddenSkills();
        postBtn.disabled = true;
        postBtn.innerHTML = '<i class="fas fa-spinner fa-pulse me-2"></i>Posting Magic...';
    });

    window.previewJob = function() {
        const title = document.getElementById('jobTitle').value || 'Amazing Job Role';
        const company = document.querySelector('[name="company"]').value || 'Cool Company';
        const location = document.querySelector('[name="location"]').value || 'Worldwide Remote';
        const salary = document.querySelector('[name="salary_range"]').value || '✨ Best in Industry';
        const jobType = document.querySelector('[name="job_type"]:checked')?.value || 'Full-time';
        const exp = document.querySelector('[name="experience_required"]').value || 'Any level';
        const description = document.getElementById('jobDescription').value || 'Describe your awesome workplace...';
        const requirements = document.getElementById('jobRequirements').value || '';
        const skillsPreview = skillsArray.length ? skillsArray.map(s => `<span class="badge bg-gradient" style="background: linear-gradient(145deg, #f0c0e8, #ffe0f5); color:#a8229a; padding:8px 16px; border-radius: 40px; margin:4px;">${escapeHtml(s)}</span>`).join(' ') : '<span class="text-muted">🌟 No skills added</span>';
        
        const modalContent = document.getElementById('previewContent');
        modalContent.innerHTML = `
            <div class="p-2">
                <h2 class="fw-bold" style="color:#6b21a5;">${escapeHtml(title)}</h2>
                <p class="fs-5 fw-semibold" style="color:#f97316;">${escapeHtml(company)}</p>
                <div class="d-flex flex-wrap gap-3 border-bottom pb-3 mb-3">
                    <span><i class="fas fa-map-marker-alt text-purple"></i> ${escapeHtml(location)}</span>
                    <span><i class="fas fa-coins text-warning"></i> ${escapeHtml(salary)}</span>
                    <span><i class="fas fa-briefcase text-info"></i> ${escapeHtml(exp)}</span>
                    <span><i class="fas fa-calendar-alt"></i> ${escapeHtml(jobType)}</span>
                </div>
                <div class="mt-3"><strong class="fs-6">📌 Description</strong><p class="mt-1">${escapeHtml(description).replace(/\n/g, '<br>')}</p></div>
                ${requirements ? `<div class="mt-3"><strong>✅ Requirements</strong><p>${escapeHtml(requirements).replace(/\n/g, '<br>')}</p></div>` : ''}
                <div class="mt-3"><strong>🔧 Skills needed</strong><div class="d-flex flex-wrap gap-2 mt-2">${skillsPreview}</div></div>
                <div class="alert alert-light mt-4 border-start border-4 border-success"><i class="fas fa-heart text-danger"></i> Excited to apply? This job will go live after posting!</div>
            </div>
        `;
        const previewModal = new bootstrap.Modal(document.getElementById('previewModal'));
        previewModal.show();
    };

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }
    
    // initial helper to add some dummy skills for demo? optional but not needed
    // But adding default skill example beautiful?
    setTimeout(() => {
        if(skillsArray.length === 0) {
            skillsArray.push('JavaScript', 'Teamwork', 'Creativity');
            renderSkillsTags();
            updateHiddenSkills();
        }
    }, 100);
</script>
</body>
</html>
