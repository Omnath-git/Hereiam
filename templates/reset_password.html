{% extends "base.html" %}

{% block title %}Reset Password - Professionals Data Bank{% endblock %}

{% block extra_css %}
<style>
    .reset-container {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 0;
    }
    .reset-card {
        background: white;
        border-radius: 20px;
        padding: 36px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border: 1px solid #f1f5f9;
        max-width: 440px;
        width: 100%;
    }
    .reset-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #dbeafe, #bfdbfe);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 1.8rem;
        color: #3b82f6;
    }
    .reset-card h2 {
        text-align: center;
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 4px;
    }
    .reset-card .email-info {
        text-align: center;
        color: #64748b;
        font-size: 0.85rem;
        margin-bottom: 20px;
    }
    .otp-input {
        text-align: center;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 8px;
    }
    .btn-reset-pw {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-size: 0.95rem;
        transition: all 0.3s;
    }
    .btn-reset-pw:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(99,102,241,0.3);
    }
    .btn-reset-pw:disabled { opacity: 0.5; cursor: not-allowed; }
    .resend-link {
        display: block;
        text-align: center;
        margin-top: 12px;
        font-size: 0.8rem;
        color: #6366f1;
        cursor: pointer;
    }
    .resend-link:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="reset-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-sm-8">
                <div class="reset-card">
                    <div class="reset-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <h2>Reset Password</h2>
                    <p class="email-info">
                        OTP sent to <strong>{{ email }}</strong>
                    </p>
                    
                    <form method="POST" action="{{ url_for('auth.reset_password') }}" id="resetForm">
                        <!-- OTP -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Enter OTP</label>
                            <input type="text" name="otp" class="form-control otp-input" 
                                   placeholder="••••••" maxlength="6" pattern="[0-9]{6}" 
                                   inputmode="numeric" required autofocus>
                        </div>
                        
                        <!-- New Password -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">New Password</label>
                            <input type="password" name="new_password" class="form-control" 
                                   placeholder="Min 6 characters" minlength="6" required id="newPassword">
                        </div>
                        
                        <!-- Confirm Password -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Confirm Password</label>
                            <input type="password" name="confirm_password" class="form-control" 
                                   placeholder="Re-enter password" minlength="6" required id="confirmPassword">
                            <small class="text-danger d-none" id="mismatchError">Passwords do not match!</small>
                        </div>
                        
                        <button type="submit" class="btn-reset-pw">
                            <i class="fas fa-save me-2"></i>Reset Password
                        </button>
                    </form>
                    
                    <a class="resend-link" onclick="resendOTP()">
                        <i class="fas fa-redo me-1"></i>Resend OTP
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Password match check
    document.getElementById('confirmPassword').addEventListener('input', function() {
        const pw = document.getElementById('newPassword').value;
        const mismatch = document.getElementById('mismatchError');
        if (this.value && this.value !== pw) {
            mismatch.classList.remove('d-none');
        } else {
            mismatch.classList.add('d-none');
        }
    });
    
    // Resend OTP
    function resendOTP() {
        const btn = document.querySelector('.resend-link');
        btn.textContent = 'Sending...';
        btn.style.pointerEvents = 'none';
        
        fetch('{{ url_for("auth.resend_reset_otp") }}', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    alert('✅ New OTP sent to your email!');
                } else {
                    alert('❌ ' + data.message);
                }
                btn.innerHTML = '<i class="fas fa-redo me-1"></i>Resend OTP';
                btn.style.pointerEvents = 'auto';
            })
            .catch(() => {
                alert('Error sending OTP. Please try again.');
                btn.innerHTML = '<i class="fas fa-redo me-1"></i>Resend OTP';
                btn.style.pointerEvents = 'auto';
            });
    }
</script>
{% endblock %}s
