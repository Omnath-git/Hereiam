{% extends "base.html" %}

{% block title %}Verify OTP - Here I Am{% endblock %}

{% block extra_css %}
<style>
    .verify-container {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 0;
    }
    
    .verify-card {
        background: white;
        border-radius: 20px;
        padding: 36px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border: 1px solid #f1f5f9;
        max-width: 460px;
        width: 100%;
    }
    
    .verify-icon {
        width: 64px; height: 64px;
        background: linear-gradient(135deg, #dbeafe, #bfdbfe);
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        margin: 0 auto 20px; font-size: 1.8rem; color: #3b82f6;
    }
    
    .verify-card h2 {
        text-align: center; font-family: 'Playfair Display', serif;
        font-weight: 700; color: #1e293b; margin-bottom: 4px;
    }
    
    .verify-card .email-info {
        text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 20px;
    }
    
    /* Timer */
    .timer-box {
        background: #fef3c7; border-radius: 12px; padding: 14px;
        text-align: center; margin-bottom: 20px; border: 1px solid #fde68a;
    }
    .timer-box .timer-value {
        font-size: 1.8rem; font-weight: 800; color: #d97706;
        font-family: 'JetBrains Mono', monospace;
    }
    .timer-box.expired { background: #fee2e2; border-color: #fecaca; }
    .timer-box.expired .timer-value { color: #dc2626; }
    
    /* OTP Input */
    .otp-input {
        width: 100%; padding: 14px 16px; border: 2px solid #e5e7eb;
        border-radius: 12px; font-size: 1.8rem; font-weight: 700;
        text-align: center; letter-spacing: 12px;
        font-family: 'JetBrains Mono', monospace; background: #fafafa;
    }
    .otp-input:focus { outline: none; border-color: #6366f1; background: white; }
    
    /* Buttons */
    .btn-verify {
        width: 100%; padding: 13px; background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white; border: none; border-radius: 12px;
        font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.3s;
    }
    .btn-verify:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99,102,241,0.3); }
    .btn-verify:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .btn-resend {
        width: 100%; padding: 10px; margin-top: 8px;
        background: transparent; color: #6366f1; border: 2px solid #6366f1;
        border-radius: 12px; font-weight: 600; font-size: 0.85rem; cursor: pointer;
        transition: all 0.3s;
    }
    .btn-resend:hover:not(:disabled) { background: #eef2ff; }
    .btn-resend:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .back-link { display: block; text-align: center; margin-top: 12px; color: #64748b; font-size: 0.82rem; }
    
    @media (max-width: 480px) {
        .verify-card { padding: 24px 16px; border-radius: 16px; }
        .otp-input { font-size: 1.4rem; letter-spacing: 8px; }
    }
</style>
{% endblock %}

{% block content %}
<div class="verify-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-sm-8">
                
                <div class="verify-card">
                    <div class="verify-icon"><i class="fas fa-shield-alt"></i></div>
                    <h2>Verify Your Email</h2>
                    <p class="email-info">OTP sent to <strong>{{ email }}</strong></p>
                    
                    <!-- Timer -->
                    <div class="timer-box" id="timerBox">
                        <small style="display:block;color:#92400e;font-weight:600;">⏱️ Time Remaining</small>
                        <div class="timer-value" id="timerDisplay">30:00</div>
                    </div>
                    
                    <!-- OTP Form -->
                    <form method="POST" action="{{ url_for('auth.verify_otp') }}" id="otpForm">
                        <input type="hidden" name="email" value="{{ email }}">
                        <input type="hidden" name="mobile" value="{{ mobile or '0000000000' }}">
                        
                        <div class="mb-3">
                            <input type="text" name="email_otp" class="otp-input" id="otpInput"
                                   placeholder="000000" maxlength="6" pattern="[0-9]{6}" 
                                   inputmode="numeric" autocomplete="one-time-code" required autofocus>
                        </div>
                        
                        <button type="submit" class="btn-verify" id="verifyBtn">
                            <i class="fas fa-check-circle me-2"></i>Verify & Complete
                        </button>
                    </form>
                    
                    <!-- Resend Button -->
                    <button class="btn-resend" id="resendBtn" onclick="resendOTP()">
                        <i class="fas fa-redo me-1"></i> Resend OTP
                    </button>
                    <div id="resendMsg" style="text-align:center;margin-top:6px;font-size:0.78rem;color:#10b981;display:none;"></div>
                    
                    <a href="{{ url_for('auth.register') }}" class="back-link">
                        <i class="fas fa-arrow-left me-1"></i> Back to Registration
                    </a>
                </div>
                
            </div>
        </div>
    </div>
</div>

<script>
    // ⭐ Timer - 30 minutes
    let timeLeft = 1800;
    let timerInterval = null;
    
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        const display = document.getElementById('timerDisplay');
        const box = document.getElementById('timerBox');
        
        timerInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                display.textContent = '00:00';
                box.classList.add('expired');
                document.getElementById('verifyBtn').disabled = true;
                document.getElementById('otpInput').disabled = true;
                return;
            }
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            display.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
        }, 1000);
    }
    
    // Auto-submit on 6 digits
    document.getElementById('otpInput').addEventListener('input', function() {
        this.value = this.value.replace(/[^0-9]/g, '');
        if (this.value.length === 6 && timeLeft > 0) {
            document.getElementById('otpForm').dispatchEvent(new Event('submit'));
        }
    });
    
    // Paste OTP
    document.addEventListener('paste', function(e) {
        const pasted = (e.clipboardData || window.clipboardData).getData('text');
        if (/^\d{6}$/.test(pasted) && document.activeElement === document.getElementById('otpInput')) {
            e.preventDefault();
            document.getElementById('otpInput').value = pasted;
            if (timeLeft > 0) {
                setTimeout(() => document.getElementById('otpForm').dispatchEvent(new Event('submit')), 300);
            }
        }
    });
    
    // ⭐ Resend OTP
    function resendOTP() {
        const btn = document.getElementById('resendBtn');
        const msg = document.getElementById('resendMsg');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Sending...';
        
        const formData = new FormData();
        formData.append('email', '{{ email }}');
        
        fetch('{{ url_for("auth.resend_otp") }}', { method: 'POST', body: formData })
            .then(r => {
                if (r.redirected) { window.location.href = r.url; return; }
                
                msg.style.display = 'block';
                msg.textContent = '✅ New OTP sent! Valid for 30 minutes.';
                
                // Reset timer
                timeLeft = 1800;
                document.getElementById('timerBox').classList.remove('expired');
                document.getElementById('timerDisplay').textContent = '30:00';
                if (timerInterval) clearInterval(timerInterval);
                startTimer();
                
                // Reset input
                const input = document.getElementById('otpInput');
                input.value = '';
                input.disabled = false;
                input.focus();
                
                // Reset button
                document.getElementById('verifyBtn').disabled = false;
                
                // Re-enable resend after 30 seconds
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-redo me-1"></i> Resend OTP';
                    msg.style.display = 'none';
                }, 30000);
            })
            .catch(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-redo me-1"></i> Resend OTP';
                alert('Error sending OTP. Please try again.');
            });
    }
    
    document.addEventListener('DOMContentLoaded', startTimer);
</script>
{% endblock %}
