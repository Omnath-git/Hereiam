{% extends "base.html" %}

{% block title %}Forgot Password - Professionals Data Bank{% endblock %}

{% block extra_css %}
<style>
    .forgot-container {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 0;
    }
    .forgot-card {
        background: white;
        border-radius: 20px;
        padding: 36px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border: 1px solid #f1f5f9;
        max-width: 440px;
        width: 100%;
    }
    .forgot-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #fef3c7, #fde68a);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 1.8rem;
        color: #f59e0b;
    }
    .forgot-card h2 {
        text-align: center;
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 8px;
    }
    .forgot-card p {
        text-align: center;
        color: #64748b;
        font-size: 0.9rem;
        margin-bottom: 24px;
    }
    .btn-reset {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-size: 0.95rem;
        transition: all 0.3s;
    }
    .btn-reset:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(245,158,11,0.3);
    }
    .back-link {
        display: block;
        text-align: center;
        margin-top: 16px;
        color: #64748b;
        font-size: 0.85rem;
    }
    .back-link:hover { color: #6366f1; }
</style>
{% endblock %}

{% block content %}
<div class="forgot-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-sm-8">
                <div class="forgot-card">
                    <div class="forgot-icon">
                        <i class="fas fa-lock"></i>
                    </div>
                    <h2>Forgot Password?</h2>
                    <p>Enter your registered email address and we'll send you a reset OTP.</p>
                    
                    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" name="email" class="form-control" 
                                       placeholder="your@email.com" required autofocus>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn-reset">
                            <i class="fas fa-paper-plane me-2"></i>Send Reset OTP
                        </button>
                    </form>
                    
                    <a href="{{ url_for('auth.login') }}" class="back-link">
                        <i class="fas fa-arrow-left me-1"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
