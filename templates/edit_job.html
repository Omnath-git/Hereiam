{% extends "base.html" %}

{% block title %}Edit Job - Professionals Data Bank{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            
            <div class="card">
                <div class="card-header" style="background: var(--gradient-dark); color: white; border-radius: 16px 16px 0 0;">
                    <h4 class="mb-0"><i class="fas fa-edit me-2"></i>Edit Job Posting</h4>
                </div>
                <div class="card-body p-4">
                    
                    <form method="POST" action="{{ url_for('jobs.edit_job', job_id=job.id) }}">
                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label class="form-label fw-bold">Job Title *</label>
                                <input type="text" name="title" class="form-control" value="{{ job.title }}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Job Type</label>
                                <select name="job_type" class="form-select">
                                    <option value="Full-time" {% if job.job_type == 'Full-time' %}selected{% endif %}>Full-time</option>
                                    <option value="Part-time" {% if job.job_type == 'Part-time' %}selected{% endif %}>Part-time</option>
                                    <option value="Contract" {% if job.job_type == 'Contract' %}selected{% endif %}>Contract</option>
                                    <option value="Remote" {% if job.job_type == 'Remote' %}selected{% endif %}>Remote</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Company</label>
                                <input type="text" name="company" class="form-control" value="{{ job.company }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Location</label>
                                <input type="text" name="location" class="form-control" value="{{ job.location }}">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Salary Range</label>
                                <select name="salary_range" class="form-select">
                                    <option value="">Select</option>
                                    <option value="Not Disclosed" {% if job.salary_range == 'Not Disclosed' %}selected{% endif %}>Not Disclosed</option>
                                    <option value="0-3 LPA" {% if job.salary_range == '0-3 LPA' %}selected{% endif %}>0-3 LPA</option>
                                    <option value="3-6 LPA" {% if job.salary_range == '3-6 LPA' %}selected{% endif %}>3-6 LPA</option>
                                    <option value="6-10 LPA" {% if job.salary_range == '6-10 LPA' %}selected{% endif %}>6-10 LPA</option>
                                    <option value="10-15 LPA" {% if job.salary_range == '10-15 LPA' %}selected{% endif %}>10-15 LPA</option>
                                    <option value="15-25 LPA" {% if job.salary_range == '15-25 LPA' %}selected{% endif %}>15-25 LPA</option>
                                    <option value="25-50 LPA" {% if job.salary_range == '25-50 LPA' %}selected{% endif %}>25-50 LPA</option>
                                    <option value="50+ LPA" {% if job.salary_range == '50+ LPA' %}selected{% endif %}>50+ LPA</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Experience Required</label>
                                <select name="experience_required" class="form-select">
                                    <option value="">Select</option>
                                    <option value="Fresher" {% if job.experience_required == 'Fresher' %}selected{% endif %}>Fresher</option>
                                    <option value="1-3 years" {% if job.experience_required == '1-3 years' %}selected{% endif %}>1-3 years</option>
                                    <option value="3-5 years" {% if job.experience_required == '3-5 years' %}selected{% endif %}>3-5 years</option>
                                    <option value="5-8 years" {% if job.experience_required == '5-8 years' %}selected{% endif %}>5-8 years</option>
                                    <option value="8-12 years" {% if job.experience_required == '8-12 years' %}selected{% endif %}>8-12 years</option>
                                    <option value="12+ years" {% if job.experience_required == '12+ years' %}selected{% endif %}>12+ years</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>
                            <textarea name="description" class="form-control" rows="5" required>{{ job.description }}</textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Requirements</label>
                            <textarea name="requirements" class="form-control" rows="4">{{ job.requirements }}</textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Skills Required (comma separated)</label>
                            <input type="text" name="skills_required" class="form-control" value="{{ job.skills_required }}">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Apply Method</label>
                            <select name="apply_method" class="form-select">
                                <option value="email" {% if job.apply_method == 'email' %}selected{% endif %}>Via Email</option>
                                <option value="website" {% if job.apply_method == 'website' %}selected{% endif %}>Via Website</option>
                                <option value="both" {% if job.apply_method == 'both' %}selected{% endif %}>Both</option>
                            </select>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Apply Email</label>
                                <input type="email" name="apply_email" class="form-control" value="{{ job.apply_email }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Apply Website</label>
                                <input type="url" name="apply_website" class="form-control" value="{{ job.apply_website }}">
                            </div>
                        </div>
                        
                        <div class="d-flex gap-2 justify-content-end mt-3">
                            <a href="{{ url_for('jobs.my_jobs') }}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Update Job
                            </button>
                        </div>
                    </form>
                    
                </div>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
